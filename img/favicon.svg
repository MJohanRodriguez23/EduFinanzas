<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0c060"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)" stroke="#c9a84c" stroke-width="2" stroke-opacity="0.3"/>
  <!-- Chart line going up -->
  <polyline points="12,46 22,38 32,42 42,28 52,18" fill="none" stroke="url(#gold)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow tip -->
  <polyline points="46,18 52,18 52,24" fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Base line -->
  <line x1="10" y1="50" x2="54" y2="50" stroke="#c9a84c" stroke-width="2" stroke-opacity="0.25" stroke-linecap="round"/>
</svg>
